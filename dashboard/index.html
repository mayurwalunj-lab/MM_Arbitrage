<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Market Making Dashboard</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary: #4F46E5; /* Indigo */
            --bg-body: #F3F4F6;
            --bg-card: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --success: #10B981;
            --success-bg: #ECFDF5;
            --danger: #EF4444;
            --danger-bg: #FEF2F2;
            --border: #E5E7EB;
            --radius: 12px;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --header-height: 70px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 40px;
            font-size: 14px; /* Base size for mobile */
        }

        /* --- Sticky Header --- */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: var(--header-height);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .brand h1 {
            font-size: 18px;
            font-weight: 700;
            margin: 0;
            color: var(--primary);
        }

        .brand span {
            font-size: 11px;
            color: var(--text-muted);
            display: block;
        }

        .db-select-wrapper {
            position: relative;
        }

        select.header-select {
            padding: 8px 32px 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-body);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23111827%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 8px;
        }

        /* --- Layout --- */
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            gap: 20px;
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
            border: 1px solid var(--border);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- Form Controls --- */
        select.filter-select {
            width: auto;
            min-width: 120px;
            padding: 6px 24px 6px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-main);
            background-color: white;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%236B7280%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 8px;
        }

        /* --- Inventory Grid --- */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .stat-box {
            background: #FAFAFA;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .stat-sub {
            font-size: 12px;
            color: var(--text-muted);
        }

        .status-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* State Colors */
        .positive-state { color: var(--success); }
        .negative-state { color: var(--danger); }
        
        .badge-pos { background: var(--success-bg); color: var(--success); }
        .badge-neg { background: var(--danger-bg); color: var(--danger); }

        /* --- Volume Big Display --- */
        .volume-display {
            text-align: center;
            padding: 10px 0;
        }
        .volume-val {
            font-size: 32px;
            font-weight: 800;
            background: -webkit-linear-gradient(45deg, #4F46E5, #7C3AED);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .volume-lbl {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- Charts --- */
        .chart-wrapper {
            position: relative;
            height: 300px;
            width: 100%;
        }

        /* --- Responsive Tables (Card View for Mobile) --- */
        .table-wrapper {
            width: 100%;
            overflow-x: hidden;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 12px;
            background-color: #F9FAFB;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        .net-diff {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
        }
        .net-pos { background: var(--success-bg); border: 1px solid var(--success); }
        .net-neg { background: var(--danger-bg); border: 1px solid var(--danger); }

        /* --- Mobile Optimization (iPhone Pro Max Width ~430px) --- */
        @media (max-width: 768px) {
            .dashboard { padding: 10px; gap: 15px; }
            .inventory-grid { grid-template-columns: 1fr; gap: 10px; }
            
            /* Stack Card Headers */
            .card-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .filter-select { width: 100%; }

            /* Stat Box Layout for Mobile */
            .stat-box {
                display: grid;
                grid-template-columns: 1fr 1fr;
                text-align: left;
                align-items: center;
            }
            .stat-label { grid-column: 1 / -1; margin-bottom: 5px; }
            .stat-value { font-size: 20px; }
            .stat-sub { text-align: right; }
            .status-badge { grid-column: 1 / -1; width: fit-content; margin-top: 5px; }

            /* Transform Table to Cards */
            .mobile-table thead { display: none; }
            .mobile-table tr {
                display: block;
                border: 1px solid var(--border);
                border-radius: 8px;
                margin-bottom: 10px;
                background: #fff;
            }
            .mobile-table td {
                display: flex;
                justify-content: space-between;
                border-bottom: 1px solid #f3f3f3;
                padding: 10px 15px;
            }
            .mobile-table td:last-child { border-bottom: none; }
            .mobile-table td::before {
                content: attr(data-label);
                font-weight: 600;
                color: var(--text-muted);
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- Sticky Header -->
    <header>
        <div class="brand">
            <h1>MM Dashboard</h1>
            <span>Live Analytics</span>
        </div>
        <div class="db-select-wrapper">
            <select id="databaseFilter" onchange="onDatabaseChange()" class="header-select">
                <option value="bitmart" selected>BitMart</option>
                <option value="lbank">LBank</option>
            </select>
        </div>
    </header>

    <main class="dashboard">

        <!-- Volume Card -->
        <section class="card">
            <div class="card-header">
                <div class="card-title">📊 Trade Volume</div>
                <select id="volumeFilter" onchange="getVolume()" class="filter-select">
                    <option value="today" selected>Today</option>
                    <option value="1">1H</option>
                    <option value="4">4H</option>
                    <option value="24">24H</option>
                    <option value="168">7D</option>
                </select>
            </div>
            <div class="volume-display">
                <div class="volume-lbl">Total USD Volume</div>
                <div id="volumeValue" class="volume-val">Loading...</div>
            </div>
        </section>

        <!-- Inventory Card -->
        <section class="card">
            <div class="card-header">
                <div class="card-title">📦 Live Inventory</div>
                <button onclick="loadInventory()" style="background:none; border:none; color:var(--primary); font-size:12px; font-weight:600;">Refresh</button>
            </div>
            
            <div class="inventory-grid">
                <!-- Bot A -->
                <div class="stat-box" id="botABox">
                    <div class="stat-label">Bot A Holding</div>
                    <div class="stat-value" id="botAValue">--</div>
                    <div class="stat-sub" id="botAUsdtValue">--</div>
                    <div class="status-badge" id="botAStatus">--</div>
                </div>
                
                <!-- Bot B -->
                <div class="stat-box" id="botBBox">
                    <div class="stat-label">Bot B Holding</div>
                    <div class="stat-value" id="botBValue">--</div>
                    <div class="stat-sub" id="botBUsdtValue">--</div>
                    <div class="status-badge" id="botBStatus">--</div>
                </div>
                
                <!-- Net -->
                <div class="stat-box" id="netL1XBox">
                    <div class="stat-label">Net L1X Exposure</div>
                    <div class="stat-value" id="netL1XValue">--</div>
                    <div class="stat-sub" id="netUsdtValue">--</div>
                    <div class="status-badge" id="netL1XStatus">--</div>
                </div>
            </div>
        </section>

        <!-- Chart Card -->
        <section class="card">
            <div class="card-header">
                <div class="card-title">📈 Price Action</div>
                <select id="chartFilter" onchange="loadPriceChart()" class="filter-select">
                    <option value="today" selected>Today</option>
                    <option value="1">1H</option>
                    <option value="24">24H</option>
                    <option value="168">7D</option>
                </select>
            </div>
            <div class="chart-wrapper">
                <canvas id="priceChart"></canvas>
            </div>
        </section>

        <!-- Analysis Card -->
        <section class="card">
            <div class="card-header">
                <div class="card-title">⚖️ Performance</div>
                <select id="analysisFilter" onchange="loadInventoryAnalysis()" class="filter-select">
                    <option value="today" selected>Today</option>
                    <option value="1">1H</option>
                    <option value="24">24H</option>
                    <option value="168">7D</option>
                </select>
            </div>
            <div id="analysisContent">
                <div style="text-align:center; padding:20px; color:var(--text-muted)">Loading...</div>
            </div>
        </section>

    </main>

    <script>
        // --- API Configuration - Auto-detects environment ---
        const API_BASE_URL = (() => {
            const hostname = window.location.hostname;
            // If running on localhost or 127.0.0.1, use local server
            if (hostname === 'localhost' || hostname === '127.0.0.1' || hostname === '') {
                return `http://localhost:5002`; // Local development
            }
            // Otherwise use production URL
            return `http://157.173.109.193:5002`; // Production
        })();

        // --- LOGIC (Kept largely the same, but adapted for new UI classes) ---

        let priceChart = null;

        function getSelectedDatabase() {
            return document.getElementById('databaseFilter').value;
        }

        function onDatabaseChange() {
            getVolume();
            loadPriceChart();
            loadInventory();
            loadInventoryAnalysis();
        }

        async function getVolume() {
            let hours = document.getElementById('volumeFilter').value;
            const database = getSelectedDatabase();
            const display = document.getElementById('volumeValue');
            const label = document.querySelector('.volume-lbl');
            
            display.style.opacity = '0.5';

            try {
                const response = await fetch(`${API_BASE_URL}/api/volume?hours=${hours}&database=${database}`);
                const data = await response.json();

                if (data.error) {
                    display.innerText = "Error";
                    if (label) label.innerText = "Total USD Volume";
                    return;
                }

                const formatter = new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD',
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 0
                });

                display.innerText = formatter.format(data.volume);

                // Update label to show hours elapsed if "today" is selected
                if (hours === 'today' && data.hours_elapsed !== null && data.hours_elapsed !== undefined) {
                    if (label) {
                        label.innerText = `Total USD Volume (Today in ${data.hours_elapsed} hr)`;
                    }
                } else {
                    if (label) label.innerText = "Total USD Volume";
                }

            } catch (err) {
                console.error(err);
                display.innerText = "N/A";
                if (label) label.innerText = "Total USD Volume";
            } finally {
                display.style.opacity = '1';
            }
        }

        async function loadPriceChart() {
            let hours = document.getElementById('chartFilter').value;
            const database = getSelectedDatabase();
            const canvas = document.getElementById('priceChart');
            const ctx = canvas.getContext('2d');

            if (priceChart) {
                priceChart.destroy(); // Clean destroy for resize
            }

            try {
                const response = await fetch(`${API_BASE_URL}/api/price-chart?hours=${hours}&database=${database}`);
                const data = await response.json();

                if (data.error) return;

                const labels = data.data.map(item => {
                    const date = new Date(item.timestamp);
                    return date.toLocaleString('en-US', {
                        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                    });
                });
                const prices = data.data.map(item => item.price);

                priceChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Price',
                            data: prices,
                            borderColor: '#4F46E5',
                            backgroundColor: 'rgba(79, 70, 229, 0.1)',
                            borderWidth: 2,
                            pointRadius: 0,
                            pointHoverRadius: 4,
                            tension: 0.3,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { intersect: false, mode: 'index' },
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { display: false },
                            y: { grid: { color: '#f3f4f6' } }
                        }
                    }
                });
            } catch (err) { console.error(err); }
        }

        async function loadInventory() {
            const database = getSelectedDatabase();
            const numFmt = new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            const usdtFmt = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });

            // Helper to update boxes
            const updateBox = (prefix, l1x, usdt) => {
                const valEl = document.getElementById(`${prefix}Value`);
                const usdtEl = document.getElementById(`${prefix}UsdtValue`);
                const statusEl = document.getElementById(`${prefix}Status`);
                
                valEl.innerText = numFmt.format(l1x) + ' L1X';
                usdtEl.innerText = usdtFmt.format(usdt);
                
                // Styling based on positive/negative
                const isPos = l1x >= 0;
                valEl.className = `stat-value ${isPos ? 'positive-state' : 'negative-state'}`;
                statusEl.className = `status-badge ${isPos ? 'badge-pos' : 'badge-neg'}`;
                statusEl.innerText = isPos ? 'Accumulating' : 'Distributing';
            };

            try {
                const response = await fetch(`${API_BASE_URL}/api/inventory?database=${database}`);
                const data = await response.json();
                
                if(!data.error) {
                    updateBox('botA', data.bot_a, data.bot_a_usdt);
                    updateBox('botB', data.bot_b, data.bot_b_usdt);
                    
                    const netL1X = data.net_l1x;
                    const netUsdt = (data.bot_a_usdt || 0) + (data.bot_b_usdt || 0);
                    updateBox('netL1X', netL1X, netUsdt);
                }
            } catch (err) { console.error(err); }
        }

        async function loadInventoryAnalysis() {
            let hours = document.getElementById('analysisFilter').value;
            const database = getSelectedDatabase();
            const container = document.getElementById('analysisContent');

            container.innerHTML = '<div style="text-align:center; padding:20px; color:#999">Analyzing...</div>';

            try {
                const response = await fetch(`${API_BASE_URL}/api/inventory-analysis?hours=${hours}&database=${database}`);
                const data = await response.json();

                if (data.error) {
                    container.innerHTML = 'Error loading data';
                    return;
                }

                const fmt = (n) => new Intl.NumberFormat('en-US', { maximumFractionDigits: 2 }).format(n);
                
                // Mobile-friendly HTML construction
                let html = `
                    <div style="margin-bottom: 20px;">
                        <h4 style="margin:0 0 10px 0; font-size:13px; color:var(--text-muted); border-bottom:1px solid var(--border); padding-bottom:5px;">COMBINED ASSETS (Opening)</h4>
                        <table class="mobile-table">
                            <thead><tr><th>Asset</th><th>Bot A</th><th>Bot B</th><th>Total</th></tr></thead>
                            <tbody>
                                <tr><td data-label="Asset">L1X</td><td data-label="Bot A">${fmt(data.opening.bot_a_l1x)}</td><td data-label="Bot B">${fmt(data.opening.bot_b_l1x)}</td><td data-label="Total"><strong>${fmt(data.opening.combined_l1x)}</strong></td></tr>
                                <tr><td data-label="Asset">USDT</td><td data-label="Bot A">${fmt(data.opening.bot_a_usdt)}</td><td data-label="Bot B">${fmt(data.opening.bot_b_usdt)}</td><td data-label="Total"><strong>${fmt(data.opening.combined_usdt)}</strong></td></tr>
                            </tbody>
                        </table>
                    </div>
                    
                     <div style="margin-bottom: 20px;">
                        <h4 style="margin:0 0 10px 0; font-size:13px; color:var(--text-muted); border-bottom:1px solid var(--border); padding-bottom:5px;">COMBINED ASSETS (Current)</h4>
                        <table class="mobile-table">
                            <thead><tr><th>Asset</th><th>Bot A</th><th>Bot B</th><th>Total</th></tr></thead>
                            <tbody>
                                <tr><td data-label="Asset">L1X</td><td data-label="Bot A">${fmt(data.closing.bot_a_l1x)}</td><td data-label="Bot B">${fmt(data.closing.bot_b_l1x)}</td><td data-label="Total"><strong>${fmt(data.closing.combined_l1x)}</strong></td></tr>
                                <tr><td data-label="Asset">USDT</td><td data-label="Bot A">${fmt(data.closing.bot_a_usdt)}</td><td data-label="Bot B">${fmt(data.closing.bot_b_usdt)}</td><td data-label="Total"><strong>${fmt(data.closing.combined_usdt)}</strong></td></tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="net-diff ${data.net_difference.l1x >= 0 ? 'net-pos' : 'net-neg'}">
                        <strong style="display:block; margin-bottom:10px; text-transform:uppercase;">Net Change</strong>
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <span>L1X Change:</span>
                            <strong>${fmt(data.net_difference.l1x)}</strong>
                        </div>
                        <div style="display:flex; justify-content:space-between;">
                            <span>USDT Change:</span>
                            <strong>${fmt(data.net_difference.usdt)}</strong>
                        </div>
                    </div>
                `;
                container.innerHTML = html;

            } catch (err) { console.error(err); }
        }

        // Init
        getVolume();
        loadPriceChart();
        loadInventory();
        loadInventoryAnalysis();
    </script>
</body>
</html>
